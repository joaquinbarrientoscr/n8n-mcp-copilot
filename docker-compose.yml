
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: copilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot_dev
      POSTGRES_DB: copilot
    ports:
      # 5433 to avoid clashing with any host Postgres on 5432
      - "5433:5432"
    volumes:
      - copilot_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  copilot_pgdata:
